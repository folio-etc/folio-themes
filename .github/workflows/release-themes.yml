name: Build & Publish SD Card Themes

# Builds every themes/<id>/ source into a .cptheme archive + themes.json
# manifest and publishes them as GitHub Release assets. Run manually when
# theme sources change.
#
# The build engine (build_cptheme.py, the bundled-font resolver, and the UI
# translations the fonts are subset against) lives in the firmware repo, so we
# check it out rather than vendor/duplicate it here. That repo is public, so
# the default GITHUB_TOKEN can read it — no PAT needed. Publishing targets this
# same repo, so contents:write below covers the release step.
on:
  workflow_dispatch:

permissions:
  contents: write

env:
  ENGINE_REPO: folio-etc/folio
  THEMES_REPO: folio-etc/folio-themes

jobs:
  build-themes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout theme sources
        uses: actions/checkout@v6

      - name: Checkout build engine (firmware repo)
        uses: actions/checkout@v6
        with:
          repository: ${{ env.ENGINE_REPO }}
          path: engine

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install build tools
        run: |
          sudo apt-get update && sudo apt-get install -y libfreetype6-dev
          pip install pyyaml fonttools freetype-py

      - name: Read version constants
        id: versions
        run: |
          echo "manifest=$(python3 -c 'import sys; sys.path.insert(0,"engine/scripts"); from cptheme_version import THEME_MANIFEST_VERSION; print(THEME_MANIFEST_VERSION)')" >> "$GITHUB_OUTPUT"
          echo "cpfont=$(python3 -c 'import sys; sys.path.insert(0,"engine/lib/EpdFont/scripts"); from cpfont_version import CPFONT_VERSION; print(CPFONT_VERSION)')" >> "$GITHUB_OUTPUT"

      - name: Build .cptheme archives
        run: |
          mkdir -p dist
          for d in themes/*/; do
            [ -f "$d/theme.yml" ] || continue
            id=$(basename "$d")
            python3 engine/scripts/build_cptheme.py "$d" -o "dist/$id.cptheme"
          done

      - name: Compute release tags
        id: tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="sd-themes-m${{ steps.versions.outputs.manifest }}-b${{ steps.versions.outputs.cpfont }}"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

          LAST=$(gh release list --repo "${{ env.THEMES_REPO }}" \
            --json tagName --jq \
            '[.[] | select(.tagName | startswith("'"${BASE}-r"'")) | .tagName | split("-r")[1] | tonumber] | max // 0')
          NEXT=$((LAST + 1))
          echo "versioned=${BASE}-r${NEXT}" >> "$GITHUB_OUTPUT"
          echo "revision=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Generate manifest
        run: |
          python3 engine/scripts/generate-theme-manifest.py \
            --input dist \
            --base-url "https://github.com/${{ env.THEMES_REPO }}/releases/download/${{ steps.tags.outputs.base }}/" \
            --output dist/themes.json

      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSIONED="${{ steps.tags.outputs.versioned }}"
          gh release create "$VERSIONED" dist/* \
            --repo "${{ env.THEMES_REPO }}" \
            --title "SD Card Themes (${VERSIONED#sd-themes-})" \
            --notes "Pre-built \`.cptheme\` files for Folio Reader. Use **Settings > Display > Download Themes** on the device."

      - name: Update stable tag for device downloads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="${{ steps.tags.outputs.base }}"
          gh release delete "$BASE" --repo "${{ env.THEMES_REPO }}" --yes 2>/dev/null || true
          gh release create "$BASE" dist/* \
            --repo "${{ env.THEMES_REPO }}" \
            --title "SD Card Themes (${BASE#sd-themes-})" \
            --notes "Current theme build for manifest v${{ steps.versions.outputs.manifest }}, font format v${{ steps.versions.outputs.cpfont }}. Devices download from this stable tag.

          Revision **${{ steps.tags.outputs.revision }}** — immutable copy at [\`${{ steps.tags.outputs.versioned }}\`](https://github.com/${{ env.THEMES_REPO }}/releases/tag/${{ steps.tags.outputs.versioned }})."
